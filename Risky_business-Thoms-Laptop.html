<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Risky Business</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --bg: #0a0c0f;
    --parchment-dark: #8b6914;
    --panel: #111418;
    --panel2: #181c22;
    --border: #2a3040;
    --text: #e8dcc8;
    --text-dim: #7a8090;
    --accent: #d4a843;
    --ocean: #0d1f2d;
    --glow: rgba(212,168,67,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Text', serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    text-align: center;
    padding: 8px 0 4px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0e1218 0%, var(--panel) 100%);
    flex-shrink: 0;
    position: relative;
  }

  header h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.5rem;
    color: var(--accent);
    letter-spacing: 0.3em;
    text-shadow: 0 0 30px rgba(212,168,67,0.4);
  }

  header p { font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.15em; margin-top: 1px; }

  .header-actions {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    display: flex; align-items: center; gap: 8px;
  }

  .save-status { font-size: 0.65rem; color: var(--text-dim); font-style: italic; min-width: 70px; text-align: right; }
  .save-status.ok { color: #2a9d8f; }

  .hbtn {
    border-radius: 3px;
    border: 1px solid var(--accent);
    background: none;
    color: var(--accent);
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.12em;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.18s;
  }
  .hbtn:hover { background: var(--accent); color: #0a0c0f; }
  .hbtn.danger { border-color: #c1121f; color: #c1121f; }
  .hbtn.danger:hover { background: #c1121f; color: #fff; }

  .main { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  .sidebar {
    width: 350px; min-width: 350px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow-y: auto;
    padding: 12px; gap: 12px;
  }

  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem; letter-spacing: 0.25em;
    color: var(--parchment-dark);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px; margin-bottom: 6px;
  }

  .players-list { display: flex; flex-direction: column; gap: 5px; }

  .player-card {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 7px 10px;
    background: var(--panel2);
    cursor: pointer;
    transition: all 0.2s;
  }

  .player-card.active {
    border-color: var(--pc);
    box-shadow: 0 0 10px var(--pg);
  }

  .player-card-header { display: flex; align-items: center; gap: 8px; }

  .player-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .player-name { font-family: 'Cinzel', serif; font-size: 0.78rem; font-weight: 700; flex: 1; }

  .player-territories { font-size: 0.67rem; color: var(--text-dim); margin-top: 2px; padding-left: 18px; }

  /* TERRITORY PANEL */
  .territory-panel {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px;
  }

  .territory-name {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem; font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .troop-entry {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
  }
  .troop-entry:last-child { border-bottom: none; }

  .troop-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .troop-player { font-size: 0.76rem; flex: 1; }
  .troop-controls { display: flex; align-items: center; gap: 2px; }

  .troop-btn {
    height: 20px; min-width: 22px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-size: 0.72rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.14s;
    font-family: 'Cinzel', serif;
    padding: 0 3px;
  }
  .troop-btn:hover { background: var(--accent); color: #0a0c0f; border-color: var(--accent); }

  .troop-count {
    font-family: 'Cinzel', serif;
    font-size: 0.82rem;
    min-width: 26px; text-align: center;
  }

  .no-selection {
    color: var(--text-dim); font-style: italic;
    font-size: 0.82rem; text-align: center; padding: 6px 0;
  }

  /* MAP */
  .map-area {
    flex: 1;
    background: var(--ocean);
    position: relative; overflow: hidden;
    background-image:
      radial-gradient(ellipse at 30% 40%, rgba(13,40,70,0.6) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 60%, rgba(10,30,55,0.4) 0%, transparent 50%);
  }

  #map-wrapper {
    width: 100%; height: 100%;
    overflow: hidden; position: relative;
    cursor: grab;
  }
  #map-wrapper.grabbing { cursor: grabbing; }

  #world-map {
    width: 100%; height: 100%;
    transform-origin: 0 0;
    user-select: none;
  }

  #world-map path {
    stroke: #1a3050; stroke-width: 0.4;
    fill: #2a4060;
    transition: fill 0.2s, opacity 0.15s;
    cursor: pointer;
  }
  #world-map path:hover { opacity: 0.8; stroke: rgba(212,168,67,0.55); stroke-width: 0.8; }
  #world-map path.selected { stroke: var(--accent) !important; stroke-width: 1.3 !important; }

  /* ZOOM */
  .zoom-controls {
    position: absolute; bottom: 14px; left: 14px;
    display: flex; flex-direction: column; gap: 4px; z-index: 10;
  }

  .zbtn {
    width: 32px; height: 32px;
    background: rgba(10,12,15,0.88);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-size: 1.15rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.14s;
    line-height: 1;
  }
  .zbtn:hover { background: var(--accent); color: #0a0c0f; border-color: var(--accent); }
  .zbtn.fit { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 0.05em; height: 26px; }

  /* TOOLTIP */
  .tooltip {
    position: fixed;
    background: rgba(10,12,15,0.95);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 5px 10px;
    pointer-events: none;
    font-family: 'Cinzel', serif;
    font-size: 0.68rem; color: var(--accent); letter-spacing: 0.08em;
    display: none; z-index: 200;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.6);
  }

  /* LEGEND */
  .legend {
    position: absolute; bottom: 14px; right: 14px;
    background: rgba(10,12,15,0.85);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    z-index: 10;
  }

  .legend-title {
    font-family: 'Cinzel', serif;
    font-size: 0.57rem; letter-spacing: 0.2em;
    color: var(--text-dim); margin-bottom: 6px;
  }

  .legend-row { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  .legend-name { font-size: 0.7rem; }
  .legend-count { font-family: 'Cinzel', serif; font-size: 0.62rem; color: var(--text-dim); margin-left: auto; padding-left: 12px; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--panel); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ---- MOBILE BOTTOM SHEET ---- */
  #mobile-panel {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--panel);
    border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    z-index: 300;
    max-height: 70vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }

  #mobile-panel.open { transform: translateY(0); }

  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 10px auto 6px;
  }

  .sheet-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 12px;
    gap: 0;
  }

  .sheet-tab {
    flex: 1;
    padding: 8px 4px;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .sheet-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .sheet-content { padding: 12px; }

  .sheet-pane { display: none; }
  .sheet-pane.active { display: block; }

  /* Mobile territory panel tweaks */
  #mobile-panel .troop-entry {
    padding: 7px 0;
  }

  #mobile-panel .troop-btn {
    height: 34px;
    min-width: 34px;
    font-size: 0.85rem;
  }

  #mobile-panel .troop-count {
    font-size: 1rem;
    min-width: 32px;
  }

  #mobile-panel .troop-player {
    font-size: 0.85rem;
  }

  #mobile-panel .player-card {
    padding: 10px 12px;
  }

  #mobile-panel .player-name {
    font-size: 0.9rem;
  }

  #mobile-panel .player-territories {
    font-size: 0.75rem;
  }

  /* Mobile open button */
  #mobile-open-btn {
    display: none;
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    background: var(--panel);
    border: 1px solid var(--accent);
    border-radius: 24px;
    color: var(--accent);
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    padding: 10px 22px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    white-space: nowrap;
  }

  /* Country name banner on mobile */
  #mobile-country-banner {
    display: none;
    position: fixed;
    top: 58px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10,12,15,0.92);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 5px 14px;
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    color: var(--accent);
    letter-spacing: 0.08em;
    z-index: 150;
    pointer-events: none;
    white-space: nowrap;
  }

  /* Backdrop */
  #sheet-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 299;
  }

  /* ---- STATS OVERLAY ---- */
  #stats-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 500;
    flex-direction: column;
    overflow: hidden;
  }
  #stats-overlay.open { display: flex; }

  .stats-header {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0e1218 0%, var(--panel) 100%);
    flex-shrink: 0;
    gap: 12px;
  }

  .stats-header h2 {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: 0.2em;
    flex: 1;
  }

  .stats-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
    overflow-x: auto;
  }

  .stats-tab {
    padding: 10px 18px;
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .stats-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .stats-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  .stats-pane { display: none; }
  .stats-pane.active { display: block; }

  /* Add entry form */
  .add-entry-form {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .add-entry-form .full { grid-column: 1 / -1; }

  .form-label {
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    margin-bottom: 3px;
    text-transform: uppercase;
  }

  .form-field {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .form-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'Crimson Text', serif;
    font-size: 0.9rem;
    padding: 6px 8px;
    width: 100%;
    transition: border-color 0.15s;
  }
  .form-input:focus { outline: none; border-color: var(--accent); }

  .form-select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'Crimson Text', serif;
    font-size: 0.9rem;
    padding: 6px 8px;
    width: 100%;
    cursor: pointer;
  }
  .form-select:focus { outline: none; border-color: var(--accent); }

  .add-entry-btn {
    grid-column: 1 / -1;
    background: var(--accent);
    color: #0a0c0f;
    border: none;
    border-radius: 3px;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    padding: 10px;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 4px;
  }
  .add-entry-btn:hover { background: #e8c060; }

  /* Timeline */
  .timeline { display: flex; flex-direction: column; gap: 10px; }

  .timeline-entry {
    display: flex;
    gap: 12px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    position: relative;
    transition: border-color 0.15s;
  }
  .timeline-entry:hover { border-color: var(--border); }

  .timeline-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 3px;
    box-shadow: 0 0 8px currentColor;
  }

  .timeline-body { flex: 1; }

  .timeline-name {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text);
  }

  .timeline-meta {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 2px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .timeline-meta span { display: flex; align-items: center; gap: 3px; }

  .timeline-delete {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 0.9rem;
    padding: 2px 6px;
    border-radius: 3px;
    transition: all 0.15s;
    align-self: flex-start;
  }
  .timeline-delete:hover { background: rgba(193,18,31,0.15); color: #c1121f; }

  /* Charts */
  .chart-section { margin-bottom: 24px; }

  .chart-title {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    color: var(--parchment-dark);
    text-transform: uppercase;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }

  .bar-chart { display: flex; flex-direction: column; gap: 6px; }

  .bar-row { display: flex; align-items: center; gap: 8px; }

  .bar-label {
    font-size: 0.78rem;
    min-width: 80px;
    text-align: right;
    color: var(--text-dim);
  }

  .bar-track {
    flex: 1;
    height: 20px;
    background: var(--panel2);
    border-radius: 3px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 6px;
  }

  .bar-value {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    color: rgba(0,0,0,0.7);
  }

  .bar-count {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    color: var(--text-dim);
    min-width: 24px;
  }

  /* Stat cards */
  .stat-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    text-align: center;
  }

  .stat-card-value {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.6rem;
    color: var(--accent);
  }

  .stat-card-label {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .empty-state {
    text-align: center;
    color: var(--text-dim);
    font-style: italic;
    padding: 32px 0;
    font-size: 0.9rem;
  }

  @media (max-width: 700px) {
    .add-entry-form { grid-template-columns: 1fr; }
    .stats-tab { padding: 10px 12px; font-size: 0.58rem; }
    .stats-header h2 { font-size: 0.9rem; }
  }

  /* ---- RESPONSIVE BREAKPOINT ---- */
  @media (max-width: 700px) {
    header h1 { font-size: 1.1rem; letter-spacing: 0.15em; }
    header p { font-size: 0.65rem; }
    .save-status { display: none; }
    .hbtn { font-size: 0.55rem; padding: 4px 7px; }

    .sidebar { display: none; }

    .legend { display: none !important; }
    .zoom-controls { bottom: 76px; }
    .zbtn { width: 40px; height: 40px; font-size: 1.3rem; }
    .zbtn.fit { height: 32px; font-size: 0.6rem; }

    #mobile-panel { display: block; }
    #mobile-open-btn { display: block; }
    #mobile-country-banner { display: block; }
    #sheet-backdrop { display: block; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    #sheet-backdrop.visible { opacity: 1; pointer-events: all; }
  }
</style>
</head>
<body>

<header>
  <h1>RISKY BUSINESS</h1>
  <p>WORLD DOMINATION</p>
  <div class="header-actions">
    <span class="save-status" id="save-status"></span>
    <button class="hbtn" onclick="openStats()" style="border-color:#e9c46a;color:#e9c46a;">📊 STATS</button>
    <button class="hbtn" onclick="saveData()">SAVE</button>
    <button class="hbtn danger" onclick="resetData()">RESET</button>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div>
      <div class="section-title">Commanders</div>
      <div class="players-list" id="players-list"></div>
    </div>
    <div>
      <div class="section-title">Territory</div>
      <div class="territory-panel">
        <div class="no-selection" id="no-selection">Click a territory on the map</div>
        <div id="territory-detail" style="display:none;">
          <div class="territory-name" id="territory-name"></div>
          <div id="troop-entries"></div>
        </div>
      </div>
    </div>
    <div>
      <div class="section-title">Scoreboard</div>
      <div id="scoreboard" style="display:flex; flex-direction:column; gap:3px;"></div>
    </div>
  </div>

  <div class="map-area">
    <div id="map-wrapper">
      <svg id="world-map" viewBox="0 0 2000 1001" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <div class="zoom-controls">
      <button class="zbtn" onclick="doZoom(1.3)" title="Zoom in">+</button>
      <button class="zbtn" onclick="doZoom(0.77)" title="Zoom out">−</button>
      <button class="zbtn fit" onclick="resetZoom()" title="Reset">FIT</button>
    </div>

    <div class="legend">
      <div class="legend-title">PLAYERS</div>
      <div id="legend-rows"></div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<!-- MOBILE BOTTOM SHEET -->
<div id="sheet-backdrop" onclick="closeSheet()"></div>
<button id="mobile-open-btn" onclick="openSheet()">☰ MENU</button>
<div id="mobile-country-banner">Tap a country</div>

<div id="mobile-panel">
  <div class="sheet-handle"></div>
  <div class="sheet-tabs">
    <button class="sheet-tab active" onclick="switchTab('territory')">Territory</button>
    <button class="sheet-tab" onclick="switchTab('players')">Players</button>
    <button class="sheet-tab" onclick="switchTab('scores')">Scores</button>
  </div>

g",446:"Macao",450:"Madagascar",454:"Malawi",458:"Malaysia",462:"Maldives",466:"Mali",470:"Malta",474:"Martinique",478:"Mauritania",480:"Mauritius",484:"Mexico",492:"Monaco",496:"Mongolia",498:"Moldova",499:"Montenegro",500:"Montserrat",504:"Morocco",508:"Mozambique",512:"Oman",516:"Namibia",520:"Nauru",524:"Nepal",528:"Netherlands",531:"Curaçao",533:"Aruba",534:"Sint Maarten",535:"Caribbean Netherlands",540:"New Caledonia",548:"Vanuatu",554:"New Zealand",558:"Nicaragua",562:"Niger",566:"Nigeria",570:"Niue",574:"Norfolk Island",578:"Norway",580:"Northern Mariana Islands",581:"United States Minor Outlying Islands",583:"Federated States of Micronesia",584:"Marshall Islands",585:"Palau",586:"Pakistan",591:"Panama",598:"Papua New Guinea",600:"Paraguay",604:"Peru",608:"Philippines",612:"Pitcairn Islands",616:"Poland",620:"Portugal",624:"Guinea-Bissau",626:"Timor-Leste",630:"Puerto Rico",634:"Qatar",638:"Reunion",642:"Romania",643:"Russia",646:"Rwanda",652:"Saint Barthélemy",654:"Saint Helena, Ascension and Tristan da Cunha",659:"Saint Kitts and Nevis",660:"Anguilla",662:"Saint Lucia",666:"Saint Pierre and Miquelon",670:"Saint Vincent and the Grenadines",674:"San Marino",678:"São Tomé and Príncipe",682:"Saudi Arabia",686:"Senegal",688:"Serbia",690:"Seychelles",694:"Sierra Leone",702:"Malta",703:"Slovakia",704:"Vietnam",705:"Slovenia",706:"Somalia",710:"South Africa",716:"Zimbabwe",724:"Spain",728:"South Sudan",729:"Sudan",732:"Western Sahara",740:"Suriname",744:"Svalbard and Jan Mayen",748:"Eswatini",752:"Sweden",756:"Switzerland",760:"Syria",762:"Tajikistan",764:"Thailand",768:"Togo",772:"Tokelau",776:"Tonga",780:"Trinidad and Tobago",784:"United Arab Emirates",788:"Tunisia",792:"Turkey",795:"Turkmenistan",796:"Turks and Caicos Islands",798:"Tuvalu",800:"Uganda",804:"Ukraine",807:"North Macedonia",818:"Egypt",826:"United Kingdom",831:"Guernsey",832:"Jersey",833:"Isle of Man",834:"Tanzania",840:"United States",850:"United States Virgin Islands",854:"Burkina Faso",858:"Uruguay",860:"Uzbekistan",862:"Venezuela",876:"Wallis and Futuna",882:"Samoa",886:"Taiwan",887:"Yemen",894:"Zambia",

function getCountryName(id) { return COUNTRY_NAMES[parseInt(id)] || null; }
function normalizeCountryId(id) {
  if (id === null || id === undefined || id === '') return null;
  return String(parseInt(id, 10));
}

  const offset = date.getTimezoneOffset() * 60000;
  return new Date(date.getTime() - offset).toISOString().slice(0, 10);

// ---- CONTINENTS ----
const CONTINENTS = {
  'Europe': [8,40,56,100,191,196,203,208,246,250,276,300,348,372,380,440,442,528,578,616,620,642,703,705,724,752,756,804,826],
  'Asia': [4,50,64,104,116,156,356,360,364,368,392,398,400,408,410,414,418,422,524,586,608,643,682,760,764,784,800,860,704,887],
  'Africa': [12,24,120,180,208,231,288,404,426,434,450,454,504,508,562,566,646,686,694,706,710,736,768,788,800,894,716],
  'North America': [124,192,214,222,320,332,340,484,558,591,840,630],
  'South America': [32,68,76,152,170,218,600,604,858,862,858],
  'Oceania': [36,554,598],
};

// Map country id → continent name
const COUNTRY_CONTINENT = {};
for (const [cont, ids] of Object.entries(CONTINENTS)) {
  ids.forEach(id => { COUNTRY_CONTINENT[id] = cont; });
}

function getContinentController(continentName) {
  const ids = CONTINENTS[continentName];
  if (!ids || ids.length === 0) return null;
  // Count territories won per player within this continent
  const counts = {};
  ids.forEach(id => {
    const winner = getWinner(String(id));
    if (winner) counts[winner] = (counts[winner] || 0) + 1;
  });
  // Need at least 3 countries
  const best = Object.entries(counts).sort((a,b) => b[1]-a[1])[0];
  if (!best || best[1] < 3) return null;
  // Check nobody else has same count
  const topCount = best[1];
  const tied = Object.entries(counts).filter(([,c]) => c === topCount);
  if (tied.length > 1) return null;
  return parseInt(best[0]);
}

// ---- STATE ----
let selectedPlayer = null;
let selectedCountry = null;
let troops = {}; // { countryId: { playerId: count } }
let tiebreakers = {}; // { countryId: { playerId: true/false } }
let lastUpdated = {}; // { countryId: { playerId: timestamp } }
let selectedEl = null;
const GROUP_ID = Number(window.location.pathname.split('/')[2]) || null;

async function saveData() {
  if (!GROUP_ID) return;
  const data = { troops, tiebreakers, lastUpdated, selectedPlayer, kissLog, playerColors };
  try {
    flashStatus('Saving…', false);
    await fetch(`/api/groups/${GROUP_ID}/game`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    flashStatus('Saved ✓', true);
  } catch (e) {
    flashStatus('Save failed', false);
  }
}

async function loadGroupMembers() {
  if (!GROUP_ID) return;
  try {
    const response = await fetch(`/api/groups/${GROUP_ID}`);
    const data = await response.json();
    if (!response.ok) return;
    PLAYERS = (data.group?.members || []).map(buildPlayer);
    if (!selectedPlayer || !PLAYERS.some(p => p.id === selectedPlayer)) {
      selectedPlayer = PLAYERS[0]?.id || null;
    }
  } catch (e) {
    PLAYERS = [];
  }
}

async function loadCurrentUser() {
  try {
    const response = await fetch('/api/auth/me');
    const data = await response.json();
    currentUserId = response.ok ? data.user?.id : null;
  } catch (e) {
    currentUserId = null;
  }
}

function mergeCountryState(source) {
  const normalized = {};
  Object.entries(source || {}).forEach(([countryId, values]) => {
    const id = normalizeCountryId(countryId);
    if (!id) return;
    normalized[id] = { ...(normalized[id] || {}), ...(values || {}) };
  });
  return normalized;
}

async function loadSaved() {
  if (!GROUP_ID) return;
  await Promise.all([loadGroupMembers(), loadCurrentUser()]);
  try {
    const response = await fetch(`/api/groups/${GROUP_ID}/game`);
    const data = await response.json();
    if (response.ok && data.game) {
      troops = mergeCountryState(data.game.troops);
      tiebreakers = mergeCountryState(data.game.tiebreakers);
      lastUpdated = mergeCountryState(data.game.lastUpdated);
      playerColors = data.game.playerColors || {};
      PLAYERS = PLAYERS.map((player, index) => buildPlayer(player, index));
      selectedPlayer = data.game.selectedPlayer || PLAYERS[0]?.id || null;
      kissLog = data.game.kissLog || [];
      flashStatus('Loaded ✓', true);
      renderAll();
      updateMapColors();
      return;
    }
  } catch (e) {}
  flashStatus('No saved game yet', false);
}

function resetData() {
  if (!confirm('Reset all troop data? This cannot be undone.')) return;
  troops = {};
  tiebreakers = {};
  lastUpdated = {};
  selectedCountry = null;
  selectedPlayer = PLAYERS[0].id;
  if (selectedEl) { selectedEl.classList.remove('selected'); selectedEl = null; }
  localStorage.removeItem(STORAGE_KEY);
  updateMapColors();
  renderAll();
  flashStatus('Reset ✓', true);
}

let statusTimer = null;
function flashStatus(msg, ok) {
  const el = document.getElementById('save-status');
  el.textContent = msg;
  el.className = 'save-status' + (ok ? ' ok' : '');
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => { el.textContent = ''; el.className = 'save-status'; }, 2800);
}

setInterval(() => {
  if (GROUP_ID) saveData();
}, 30000);

// ---- ZOOM & PAN ----
let scale = 1, panX = 0, panY = 0;
let isPanning = false, didPan = false;
let panStart = {x:0,y:0}, panOrigin = {x:0,y:0};

function applyTransform() {
  document.getElementById('world-map').style.transform =
    `translate(${panX}px,${panY}px) scale(${scale})`;
}

function doZoom(factor, cx, cy) {
  const wrap = document.getElementById('map-wrapper');
  const rect = wrap.getBoundingClientRect();
  const px = (cx !== undefined ? cx : rect.left + rect.width/2) - rect.left;
  const py = (cy !== undefined ? cy : rect.top + rect.height/2) - rect.top;
  const ns = Math.min(Math.max(scale * factor, 0.45), 14);
  const sd = ns / scale;
  panX = px - sd*(px - panX);
  panY = py - sd*(py - panY);
  scale = ns;
  applyTransform();
}

function resetZoom() { scale=1; panX=0; panY=0; applyTransform(); }

const wrap = document.getElementById('map-wrapper');

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  doZoom(e.deltaY < 0 ? 1.15 : 0.87, e.clientX, e.clientY);
}, { passive: false });

wrap.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  isPanning = true; didPan = false;
  panStart = {x: e.clientX, y: e.clientY};
  panOrigin = {x: panX, y: panY};
  wrap.classList.add('grabbing');
});

window.addEventListener('mousemove', e => {
  if (!isPanning) return;
  const dx = e.clientX - panStart.x;
  const dy = e.clientY - panStart.y;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) didPan = true;
  panX = panOrigin.x + dx;
  panY = panOrigin.y + dy;
  applyTransform();
});

window.addEventListener('mouseup', () => {
  isPanning = false;
  wrap.classList.remove('grabbing');
});

// ---- LOAD MAP ----
async function loadMap() {
  const resp = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
  const world = await resp.json();

  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js');
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js');
  renderMap(world);
}

function loadScript(src) {
  return new Promise(res => {
    const s = document.createElement('script');
    s.src = src; s.onload = res;
    document.head.appendChild(s);
  });
}

function renderMap(world) {
  const svg = document.getElementById('world-map');
  const countries = topojson.feature(world, world.objects.countries);

  const projection = d3.geoNaturalEarth1().scale(310).translate([1000, 490]);
  const path = d3.geoPath().projection(projection);
  const tooltip = document.getElementById('tooltip');

  countries.features.forEach(feature => {
    const id = feature.id;
    const name = getCountryName(id);
    const el = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    el.setAttribute('d', path(feature));
    el.setAttribute('data-id', id);
    el.style.fill = '#2a4060';

    el.addEventListener('mouseenter', e => {
      tooltip.style.display = 'block';
      tooltip.textContent = name;
      posTooltip(e);
    });
    el.addEventListener('mousemove', posTooltip);
    el.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
    el.addEventListener('click', e => {
      if (didPan) return;
      e.stopPropagation();
      selectCountry(id, name, el);
    });

    svg.appendChild(el);
  });

  updateMapColors();
}

function posTooltip(e) {
  const t = document.getElementById('tooltip');
  t.style.left = (e.clientX + 14) + 'px';
  t.style.top = (e.clientY - 8) + 'px';
}

// ---- GAME LOGIC ----
function getWinner(cid) {
  const t = troops[cid];
  if (!t) return null;

  // Find the highest score among players with any points
  let bestScore = 0;
  for (const score of Object.values(t)) {
    if (score > bestScore) bestScore = score;
  }
  if (bestScore === 0) return null;

  // Collect all players tied at that score
  let tied = Object.entries(t)
    .filter(([pid, score]) => score === bestScore)
    .map(([pid]) => parseInt(pid));

  // No tie — outright winner
  if (tied.length === 1) return tied[0];

  // Tiebreaker 1: check tiebreaker toggles for this country
  const tb = tiebreakers[cid] || {};
    const maxTb = Math.max(...tied.map(pid => tb[pid] || 0));
    const tbOn = maxTb > 0 ? tied.filter(pid => (tb[pid] || 0) === maxTb) : tied;
    if (tbOn.length === 1) return tbOn[0];

    const remaining = tbOn;

// Tiebreaker 2: if still tied, most recently updated troop wins
  const times = lastUpdated[cid] || {};
  return remaining.reduce((latest, pid) => {
    return (times[pid] || 0) > (times[latest] || 0) ? pid : latest;
  });
}

function countTerritories(pid) {
  let n = 0;
  for (const cid of Object.keys(troops)) { if (getWinner(cid) === pid) n++; }
  return n;
}

function selectCountry(id, name, el) {
  if (selectedEl) selectedEl.classList.remove('selected');
  selectedEl = el; el.classList.add('selected');
  selectedCountry = { id: normalizeCountryId(id), name };
  renderTerritoryPanel();
}

function changeTroops(pid, delta) {
  if (!selectedCountry || !selectedPlayer) return;
  const cid = selectedCountry.id;
  if (!troops[cid]) troops[cid] = {};
  const newVal = Math.max(0, (troops[cid][pid] || 0) + delta);
  troops[cid][pid] = newVal;
  if (!lastUpdated[cid]) lastUpdated[cid] = {};
  lastUpdated[cid][pid] = Date.now();
  const el = document.getElementById('tc-' + pid);
  if (el) el.textContent = troops[cid][pid];
  updateMapColors();
  renderPlayers();
  renderScoreboard();
  renderLegend();
  saveData();
}

function changeTiebreaker(pid, delta) {
  if (!selectedCountry) return;
  const cid = selectedCountry.id;
  if (!tiebreakers[cid]) tiebreakers[cid] = {};
  tiebreakers[cid][pid] = Math.max(0, (tiebreakers[cid][pid] || 0) + delta);
  updateMapColors();
  renderPlayers();
  renderScoreboard();
  renderLegend();
  renderTerritoryPanel();
  saveData();
}

function hexToRgb(hex) {
  return `${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`;
}

function updateMapColors() {
  document.querySelectorAll('#world-map path').forEach(p => {
    const id = normalizeCountryId(p.getAttribute('data-id'));
    const winner = getWinner(id);
    if (winner) {
      const pl = PLAYERS.find(x => x.id === winner);
      if (pl) {
        // Check if this country's continent is controlled by this player
        const cont = COUNTRY_CONTINENT[parseInt(id)];
        const contController = cont ? getContinentController(cont) : null;
        const hasContinentBonus = contController === winner;
        p.style.fill = pl.color;
        p.style.opacity = '0.82';
        p.style.stroke = hasContinentBonus ? '#fff' : '#1a3050';
        p.style.strokeWidth = hasContinentBonus ? '1.5' : '0.4';
        return;
      }
    }
    p.style.fill = '#2a4060';
    p.style.opacity = '1';
    p.style.stroke = '#1a3050';
    p.style.strokeWidth = '0.4';
  });
  renderContinentBadges();
}

function renderContinentBadges() {
  let el = document.getElementById('continent-badges');
  if (!el) {
    el = document.createElement('div');
    el.id = 'continent-badges';
    el.style.cssText = 'margin-top:8px;';
    const sb = document.getElementById('scoreboard');
    sb.parentNode.insertBefore(el, sb);
  }
  const controlled = Object.entries(CONTINENTS)
    .map(([name]) => ({ name, controller: getContinentController(name) }))
    .filter(c => c.controller);

  if (controlled.length === 0) { el.innerHTML = ''; return; }

  const section = document.createElement('div');
  section.innerHTML = `<div class="section-title" style="margin-bottom:6px;">Continents</div>`;
  controlled.forEach(({ name, controller }) => {
    const pl = PLAYERS.find(p => p.id === controller);
    if (!pl) return;
    const badge = document.createElement('div');
    badge.style.cssText = `display:flex;align-items:center;gap:6px;padding:4px 6px;background:${hexToRgba(pl.color,0.12)};border:1px solid ${pl.color};border-radius:4px;margin-bottom:4px;`;
    badge.innerHTML = `
      <span style="width:8px;height:8px;border-radius:50%;background:${pl.color};box-shadow:0 0 4px ${pl.color};flex-shrink:0"></span>
      <span style="font-family:'Cinzel',serif;font-size:0.65rem;flex:1;">${name}</span>
      <span style="font-size:0.7rem;color:${pl.color};">👑 ${pl.name}</span>
    `;
    section.appendChild(badge);
  });
  el.innerHTML = '';
  el.appendChild(section);
}

function quickAddEntry(countryId, countryName, playerId) {

  switchStatsTab('log');

// ---- TOUCH PAN & PINCH ZOOM ----
let touches = {};
let lastPinchDist = null;

wrap.addEventListener('touchstart', e => {
  e.preventDefault();
  didPan = false;
  Array.from(e.changedTouches).forEach(t => { touches[t.identifier] = {x: t.clientX, y: t.clientY}; });

  if (e.touches.length === 1) {
    panStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
    panOrigin = {x: panX, y: panY};
    isPanning = true;
  }
  if (e.touches.length === 2) {
    isPanning = false;
    lastPinchDist = getPinchDist(e.touches);
  }
}, { passive: false });

wrap.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && isPanning) {
    const dx = e.touches[0].clientX - panStart.x;
    const dy = e.touches[0].clientY - panStart.y;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) didPan = true;
    panX = panOrigin.x + dx;
    panY = panOrigin.y + dy;
    applyTransform();
  }
  if (e.touches.length === 2) {
    const dist = getPinchDist(e.touches);
    if (lastPinchDist) {
      const factor = dist / lastPinchDist;
      const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      doZoom(factor, cx, cy);
      didPan = true;
    }
    lastPinchDist = dist;
  }
}, { passive: false });

wrap.addEventListener('touchend', e => {
  isPanning = false;
  lastPinchDist = null;
  // treat as tap if no significant movement
  if (!didPan && e.changedTouches.length === 1) {
    const t = e.changedTouches[0];
    // find element under touch
    const el = document.elementFromPoint(t.clientX, t.clientY);
    if (el && el.tagName === 'path' && el.getAttribute('data-id')) {
      const id = el.getAttribute('data-id');
      const name = getCountryName(id);
      if (name) {
        selectCountry(id, name, el);
        updateMobileBanner();
        // auto-open sheet on territory tap
        if (window.innerWidth <= 700) {
          openSheet();
          switchTab('territory');
        }
      }
    }
  }
  touches = {};
}, { passive: false });

function getPinchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

function submitEntry() {
  const name = document.getElementById('entry-name').value.trim();
  if (!name) { alert('Please enter a name'); return; }
  const age = parseInt(document.getElementById('entry-age').value) || null;
  const date = document.getElementById('entry-date').value || localDateInputValue();
  const playerId = parseInt(document.getElementById('entry-player').value);
  const country = normalizeCountryId(document.getElementById('entry-country').value);
  const countryName = country ? COUNTRY_NAMES[parseInt(country)] || null : null;

  if (editingEntryId) {
    const existing = kissLog.find(e => e.id === editingEntryId);
    if (existing) {
      decrementTroopsForEntry(existing);
      Object.assign(existing, { name, age, date, playerId, country, countryName });
      incrementTroopsForEntry(existing);
    }
    editingEntryId = null;
  } else {
    const entry = { id: Date.now(), name, age, date, playerId, country, countryName };
    kissLog.unshift(entry);
    incrementTroopsForEntry(entry);
  }

  // keep date/player/country so rapid edits are easier
  document.getElementById('entry-name').value = '';
  document.getElementById('entry-age').value = '';
  const btn = document.getElementById('entry-submit-btn');
  if (btn) btn.textContent = '+ ADD ENTRY';

  saveData();

  updateMapColors();
  renderAll();
  renderStats();
}

function incrementTroopsForEntry(entry) {
  if (!entry.country || !entry.playerId) return;
  const cid = normalizeCountryId(entry.country);
  if (!troops[cid]) troops[cid] = {};
  troops[cid][entry.playerId] = (troops[cid][entry.playerId] || 0) + 1;
  if (!lastUpdated[cid]) lastUpdated[cid] = {};
  lastUpdated[cid][entry.playerId] = entry.id;
}


function decrementTroopsForEntry(entry) {
  if (!entry || !entry.country || !entry.playerId) return;
  const cid = normalizeCountryId(entry.country);
  if (!troops[cid]) return;
  const pid = entry.playerId;
  const current = troops[cid][pid] || 0;
  const next = Math.max(0, current - 1);
  if (next === 0) {
    delete troops[cid][pid];
    if (Object.keys(troops[cid]).length === 0) delete troops[cid];
  } else {
    troops[cid][pid] = next;
  }

  // Recompute lastUpdated for this (country, player) from remaining log entries.
  const remaining = kissLog.filter(e => e.id !== entry.id && normalizeCountryId(e.country) === cid && e.playerId === pid);
  if (!lastUpdated[cid]) lastUpdated[cid] = {};
  if (remaining.length === 0) {
    delete lastUpdated[cid][pid];
    if (Object.keys(lastUpdated[cid]).length === 0) delete lastUpdated[cid];
  } else {
    // newest entry is max id (we use Date.now() for id)
    const latest = remaining.reduce((a,b) => (a.id > b.id ? a : b));
    lastUpdated[cid][pid] = latest.id;
  }
}

function editEntry(id) {
  const entry = kissLog.find(e => e.id === id);
  if (!entry) return;

  editingEntryId = id;

  document.getElementById('entry-name').value = entry.name || '';
  document.getElementById('entry-age').value = entry.age ?? '';
  document.getElementById('entry-date').value = entry.date || localDateInputValue();
  document.getElementById('entry-player').value = String(entry.playerId);
  document.getElementById('entry-country').value = entry.country || '';

  // update submit button label
  const btn = document.getElementById('entry-submit-btn');
  if (btn) btn.textContent = '✎ SAVE CHANGES';
}

function deleteEntry(id) {
  const entry = kissLog.find(e => e.id === id);
  if (!entry) return;
  if (!confirm('Delete this entry?')) return;

  // Remove from log first, then update counters based on remaining state.
  kissLog = kissLog.filter(e => e.id !== id);
  decrementTroopsForEntry(entry);

  updateMapColors();
  renderAll();
  renderStats();
  saveData();
}

  return d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' });
}

      <div class="stat-card-label">Countries</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-value">${Math.min(...kissLog.filter(e=>e.age).map(e=>e.age)) || '?'}</div>
      <div class="stat-card-label">Youngest</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-value">${Math.max(...kissLog.filter(e=>e.age).map(e=>e.age)) || '?'}</div>
      <div class="stat-card-label">Oldest</div>
    </div>
  `;

  // Per player bar chart
  const playerCounts = PLAYERS.map(p => ({ label: p.name, color: p.color, count: kissLog.filter(e=>e.playerId===p.id).length }))
    .sort((a,b) => b.count - a.count);
  const maxP = Math.max(...playerCounts.map(p=>p.count), 1);
  document.getElementById('chart-player').innerHTML = playerCounts.map(p => `
    <div class="bar-row">
      <div class="bar-label">${p.label}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${(p.count/maxP*100)}%;background:${p.color};">
          ${p.count > 0 ? `<span class="bar-value">${p.count}</span>` : ''}
        </div>
      </div>
      <div class="bar-count">${p.count}</div>
    </div>
  `).join('');

  // Per country bar chart (top 10)
  const countryCounts = {};
  kissLog.forEach(e => { if (e.countryName) countryCounts[e.countryName] = (countryCounts[e.countryName]||0)+1; });
  const topCountries = Object.entries(countryCounts).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxC = Math.max(...topCountries.map(c=>c[1]), 1);
  document.getElementById('chart-country').innerHTML = topCountries.length ? topCountries.map(([name,count]) => `
    <div class="bar-row">
      <div class="bar-label">${name}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${count/maxC*100}%;background:var(--accent);">
          <span class="bar-value">${count}</span>
        </div>
      </div>
      <div class="bar-count">${count}</div>
    </div>
  `).join('') : '<div class="empty-state">No country data.</div>';

  // Age distribution (buckets of 5 years)
  const ageBuckets = {};
  kissLog.filter(e=>e.age).forEach(e => {
    const bucket = Math.floor(e.age/5)*5;
    const label = `${bucket}–${bucket+4}`;
    ageBuckets[label] = (ageBuckets[label]||0)+1;
  });
  const sortedBuckets = Object.entries(ageBuckets).sort((a,b)=>parseInt(a[0])-parseInt(b[0]));
  const maxA = Math.max(...sortedBuckets.map(b=>b[1]), 1);
  document.getElementById('chart-age').innerHTML = sortedBuckets.length ? sortedBuckets.map(([label,count]) => `
    <div class="bar-row">
      <div class="bar-label">${label}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${count/maxA*100}%;background:#c77dff;">
          <span class="bar-value">${count}</span>
        </div>
      </div>
      <div class="bar-count">${count}</div>
    </div>
  `).join('') : '<div class="empty-state">No age data.</div>';
}

function renderLeaderboard() {
  const el = document.getElementById('leaderboard-content');
  if (kissLog.length === 0) {
    el.innerHTML = '<div class="empty-state">No entries yet.</div>';
    return;
  }

  const ranked = PLAYERS.map(p => {
    const entries = kissLog.filter(e => e.playerId === p.id);
    const avgAge = entries.filter(e=>e.age).reduce((s,e)=>s+e.age,0) / (entries.filter(e=>e.age).length||1);
    const countries = new Set(entries.filter(e=>e.country).map(e=>normalizeCountryId(e.country))).size;
    return { ...p, entries, count: entries.length, avgAge, countries };
  }).sort((a,b) => b.count - a.count);

  el.innerHTML = ranked.map((p, i) => `
    <div style="background:var(--panel2);border:1px solid ${i===0?p.color:'var(--border)'};border-radius:6px;padding:14px;margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <span style="font-family:'Cinzel Decorative',serif;font-size:1.3rem;color:${i===0?'#d4a843':i===1?'#aaa':i===2?'#cd7f32':'var(--text-dim)'};">${i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`}</span>
        <span style="width:12px;height:12px;border-radius:50%;background:${p.color};box-shadow:0 0 6px ${p.color};flex-shrink:0"></span>
        <span style="font-family:'Cinzel',serif;font-size:1rem;font-weight:700;flex:1">${p.name}</span>
        <span style="font-family:'Cinzel Decorative',serif;font-size:1.4rem;color:${p.color}">${p.count}</span>
      </div>
      <div style="display:flex;gap:16px;font-size:0.78rem;color:var(--text-dim);flex-wrap:wrap;">
        <span>📊 Avg age: <b style="color:var(--text)">${p.entries.filter(e=>e.age).length ? p.avgAge.toFixed(1) : '?'}</b></span>
        <span>🌍 Countries: <b style="color:var(--text)">${p.countries}</b></span>
      </div>
      ${p.entries.length ? `
        <div style="margin-top:10px;border-top:1px solid var(--border);padding-top:8px;">
          <div style="font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.15em;color:var(--text-dim);margin-bottom:6px;">RECENT</div>
          ${p.entries.slice(0,3).map(e => {
            const dateStr = e.date ? formatDateNl(e.date) : '';
            return `<div style="font-size:0.8rem;padding:2px 0;color:var(--text)">${e.name}${e.age?` (${e.age})`:''} ${e.countryName?`• ${e.countryName}`:''} ${dateStr?`• ${dateStr}`:''}</div>`;
          }).join('')}

        </div>
      ` : ''}
    </div>
  `).join('');
}

// ---- BOOT ----
loadMap().then(() => {
  loadSaved().then(() => {
    renderAll();
    updateMapColors();
  });
});
</script>
